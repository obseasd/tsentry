<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tsentry — Autonomous Treasury Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid #1a1a2e; padding-bottom: 1rem; }
    header h1 { font-size: 1.5rem; color: #50fa7b; }
    header .status { font-size: 0.85rem; padding: 0.25rem 0.75rem; border-radius: 12px; background: #1a1a2e; }
    header .status.online { color: #50fa7b; border: 1px solid #50fa7b33; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .card { background: #12121f; border: 1px solid #1a1a2e; border-radius: 12px; padding: 1.5rem; }
    .card h3 { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .card .value { font-size: 2rem; font-weight: 700; color: #fff; }
    .card .sub { font-size: 0.85rem; color: #666; margin-top: 0.25rem; }

    .protocols { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .protocols .tag { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 6px; background: #1a1a2e; color: #8be9fd; }

    .actions { background: #12121f; border: 1px solid #1a1a2e; border-radius: 12px; padding: 1.5rem; }
    .actions h3 { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .actions .empty { color: #444; font-style: italic; }

    .chains { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .chains .chain { font-size: 0.8rem; padding: 0.3rem 0.6rem; border-radius: 8px; background: #50fa7b15; color: #50fa7b; border: 1px solid #50fa7b33; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Tsentry</h1>
      <span class="status" id="status">Loading...</span>
    </header>

    <div class="grid">
      <div class="card">
        <h3>Treasury Value</h3>
        <div class="value" id="totalValue">$0.00</div>
        <div class="sub">Across all chains</div>
      </div>
      <div class="card">
        <h3>Active Chains</h3>
        <div class="chains" id="chains"></div>
      </div>
      <div class="card">
        <h3>Protocols</h3>
        <div class="protocols" id="protocols"></div>
      </div>
      <div class="card">
        <h3>Uptime</h3>
        <div class="value" id="uptime">—</div>
      </div>
    </div>

    <div class="actions">
      <h3>Agent Actions</h3>
      <div id="actionLog" class="empty">No actions yet. Agent is idle.</div>
    </div>
  </div>

  <script>
    async function refresh() {
      try {
        const [statusRes, treasuryRes] = await Promise.all([
          fetch('/api/status'),
          fetch('/api/treasury')
        ]);
        const status = await statusRes.json();
        const treasury = await treasuryRes.json();

        // Status badge
        const el = document.getElementById('status');
        el.textContent = status.status;
        el.className = 'status online';

        // Chains
        const chainsEl = document.getElementById('chains');
        chainsEl.innerHTML = status.chains.map(c =>
          `<span class="chain">${c}</span>`
        ).join('');

        // Protocols
        const protEl = document.getElementById('protocols');
        const tags = [];
        for (const [type, protos] of Object.entries(status.protocols)) {
          for (const p of protos) tags.push(`${type}:${p}`);
        }
        protEl.innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join('');

        // Uptime
        const mins = Math.floor(status.uptime / 60);
        document.getElementById('uptime').textContent = `${mins}m`;

        // Treasury
        document.getElementById('totalValue').textContent =
          `$${treasury.total_value_usd.toFixed(2)}`;
      } catch (e) {
        document.getElementById('status').textContent = 'offline';
      }
    }

    refresh();
    setInterval(refresh, 10000);
  </script>
</body>
</html>
